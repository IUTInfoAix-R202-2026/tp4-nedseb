<svg xmlns="http://www.w3.org/2000/svg" width="700" height="360" viewBox="0 0 700 360">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 13px; font-weight: bold; fill: #2c3e50; }
      .ftitle { font-size: 12px; font-weight: bold; fill: #2c3e50; }
      .lab { font-size: 11px; fill: #1a5276; }
      .field { font-size: 12px; fill: #2c3e50; }
      .statut { font-size: 12px; fill: #1a5276; }
      .box { font-size: 12px; font-weight: bold; fill: white; }
      .sub { font-size: 10px; fill: white; }
      .step { font-size: 11px; fill: #2c3e50; }
      .inj { font-size: 10px; fill: #8e44ad; font-style: italic; }
      .id-tag { font-size: 10px; fill: #7f8c8d; font-style: italic; }
    </style>
  </defs>

  <!-- Fond -->
  <rect width="700" height="360" rx="8" ry="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="350" y="27" text-anchor="middle" class="title">Le même écran que l'exercice 3 — mais l'assemblage est fait par Guice</text>

  <!-- ===== Gauche : le formulaire (rendu identique a l'ex3) ===== -->
  <rect x="20" y="44" width="300" height="292" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="36" y="74" class="ftitle">VigieChiro PR Companion - Connexion (Guice)</text>
  <text x="36" y="102" class="lab">Identifiant</text>
  <rect x="36" y="110" width="268" height="26" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="46" y="127" class="field">marie</text>
  <text x="36" y="160" class="lab">Mot de passe</text>
  <rect x="36" y="168" width="268" height="26" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="46" y="186" class="field" font-size="14" letter-spacing="1">•••••••••</text>
  <rect x="36" y="210" width="104" height="30" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="1"/>
  <text x="88" y="229" text-anchor="middle" class="box">Se connecter</text>
  <text x="36" y="266" class="statut">Bienvenue marie !</text>
  <text x="36" y="312" class="id-tag">aucune logique d'assemblage dans la vue</text>

  <!-- ===== Droite : la chaine d'injection Guice ===== -->
  <text x="350" y="62" class="step">L'application déclare le câblage, puis Guice construit tout :</text>

  <rect x="350" y="74" width="330" height="32" rx="4" fill="#8e44ad"/>
  <text x="362" y="94" class="box">Guice.createInjector(new AppModule())</text>

  <rect x="350" y="112" width="330" height="32" rx="4" fill="#a569bd"/>
  <text x="362" y="132" class="sub" font-size="11">AppModule : bind(ServiceAuth).to(ServiceAuthSimple)</text>

  <!-- Chaine @Inject -->
  <rect x="380" y="166" width="270" height="34" rx="4" fill="#7bb563"/>
  <text x="392" y="180" class="box">ConnexionController</text>
  <text x="392" y="194" class="sub">@FXML branche la vue · reçoit le ViewModel</text>

  <line x1="515" y1="200" x2="515" y2="222" stroke="#8e44ad" stroke-width="1.5"/>
  <path d="M515,228 l-5,-8 l10,0 z" fill="#8e44ad"/>
  <text x="525" y="218" class="inj">@Inject</text>

  <rect x="380" y="228" width="270" height="34" rx="4" fill="#e8a838"/>
  <text x="392" y="242" class="box">ConnexionViewModel</text>
  <text x="392" y="256" class="sub">@Inject(ServiceAuth) sur le constructeur</text>

  <line x1="515" y1="262" x2="515" y2="284" stroke="#8e44ad" stroke-width="1.5"/>
  <path d="M515,290 l-5,-8 l10,0 z" fill="#8e44ad"/>
  <text x="525" y="280" class="inj">fournit</text>

  <rect x="380" y="290" width="270" height="32" rx="4" fill="#4a90d9"/>
  <text x="392" y="310" class="box">ServiceAuthSimple <tspan class="sub" font-weight="normal">implémente ServiceAuth</tspan></text>

  <!-- Annotation de synthese -->
  <text x="350" y="346" class="id-tag">setControllerFactory(injector::getInstance) : Guice fabrique les contrôleurs FXML</text>
</svg>
