<svg xmlns="http://www.w3.org/2000/svg" width="440" height="244" viewBox="0 0 440 244">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .lab { font-size: 13px; fill: #2c3e50; }
      .field { font-size: 13px; fill: #2c3e50; }
      .apercu { font-size: 14px; font-weight: bold; fill: #2c3e50; }
      .id-tag { font-size: 10px; fill: #7f8c8d; font-style: italic; }
      .bind { font-size: 10px; fill: #4a90d9; font-style: italic; }
    </style>
  </defs>

  <!-- Fond -->
  <rect width="440" height="244" rx="8" ry="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Fenetre (VBox racine) -->
  <rect x="20" y="20" width="400" height="204" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="32" y="40" class="id-tag">VBox · fx:controller = MessageController (ViewModel injecté)</text>

  <!-- Label invite -->
  <text x="36" y="72" class="lab">Saisissez un message :</text>

  <!-- TextField (focalisé : contour bleu) -->
  <rect x="36" y="82" width="288" height="32" rx="4" fill="white" stroke="#4a90d9" stroke-width="1.6"/>
  <text x="47" y="103" class="field">Bonjour MVVM</text>
  <text x="332" y="102" class="id-tag">#champTexte</text>

  <!-- Liaison bidirectionnelle -->
  <text x="36" y="132" class="bind">↕ bindBidirectional(viewModel.texteProperty())</text>

  <!-- Zone d'apercu (miroir live, teinte bleue = meme donnee) -->
  <rect x="36" y="142" width="288" height="36" rx="4" fill="#eaf3fb" stroke="#4a90d9" stroke-width="1"/>
  <text x="47" y="165" class="apercu">Aperçu : Bonjour MVVM</text>
  <text x="332" y="164" class="id-tag">#labelApercu</text>

  <!-- Annotation de synthese -->
  <text x="220" y="205" text-anchor="middle" class="id-tag">champ et aperçu liés à la même property : l'aperçu se met à jour à chaque frappe</text>
</svg>
